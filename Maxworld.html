<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max World Hub - Jujutsu Kaisen</title>
    <style>
        /* === BASE STYLES === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0b0b0d; color: #ffffff; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }
        
        /* === CUSTOM VIDEO PLAYER === */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Controls Overlay */
        .controls-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            opacity: 1;
            transition: opacity 0.3s;
            z-index: 10;
        }
        .video-container.playing .controls-overlay { opacity: 0; }
        .video-container:hover .controls-overlay, 
        .video-container:active .controls-overlay { opacity: 1; }

        /* Top Bar in Player */
        .player-top-bar {
            display: flex; justify-content: space-between; padding: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .player-top-bar svg { fill: #fff; width: 24px; height: 24px; cursor: pointer; }
        .help-icon { display: flex; flex-direction: column; align-items: center; font-size: 10px; opacity: 0.8;}

        /* Bottom Controls in Player */
        .player-bottom-bar {
            padding: 15px 15px 10px 15px;
            display: flex; flex-direction: column; gap: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        
        /* FULLSCREEN PURPLE GRADIENT (User Requirement) */
        .video-container:fullscreen .player-bottom-bar,
        .video-container:-webkit-full-screen .player-bottom-bar {
            background: linear-gradient(to top, rgba(128, 0, 128, 0.9) 0%, rgba(128, 0, 128, 0.4) 50%, transparent 100%) !important;
        }

        .progress-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.3);
            border-radius: 2px; cursor: pointer; position: relative;
        }
        .progress-filled {
            height: 100%; background: #00e6a8; width: 0%; border-radius: 2px; position: relative;
        }
        .progress-filled::after {
            content: ''; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .control-buttons { display: flex; align-items: center; justify-content: space-between; }
        .left-controls { display: flex; align-items: center; gap: 15px; }
        .right-controls { display: flex; align-items: center; gap: 15px; font-size: 12px; }
        .control-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; }
        .control-btn svg { fill: #fff; width: 24px; height: 24px; }

        /* === UI LAYOUT (Matching 1000146049.jpg) === */
        .app-padding { padding: 15px; }
        
        .title-row { display: flex; align-items: center; font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .title-row .info-text { font-size: 14px; color: #aaa; margin-left: 10px; font-weight: normal; cursor: pointer;}
        
        .meta-info { font-size: 12px; color: #aaa; margin-bottom: 15px; display: flex; align-items: center; gap: 5px;}
        .tv-badge { border: 1px solid #aaa; padding: 1px 4px; border-radius: 3px; font-size: 10px; }
        .star { color: #ffaa00; }

        /* Action Buttons Row */
        .action-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .action-row::-webkit-scrollbar { display: none; }
        .action-btn { 
            background: #2a2a2d; color: #fff; border: none; padding: 8px 16px; 
            border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; white-space: nowrap; cursor: pointer;
        }
        .action-btn svg { fill: #fff; width: 16px; height: 16px; }

        /* Resources Section */
        .resources-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .resources-title span { font-size: 12px; color: #aaa; font-weight: normal; }
        
        .dropdown-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .dropdown { 
            background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 8px 12px; 
            border-radius: 5px; font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer;
        }
        .dropdown::after { content: '∨'; font-size: 10px; margin-left: 5px; }

        /* Episodes Grid/Scroll */
        .episodes-row { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; margin-bottom: 25px; }
        .episodes-row::-webkit-scrollbar { display: none; }
        .ep-box { 
            background: #2a2a2d; padding: 12px 20px; border-radius: 5px; 
            font-size: 14px; cursor: pointer; white-space: nowrap; font-weight: 500;
        }
        .ep-box.active { background: #004d40; color: #00e6a8; }

        /* Tabs */
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab { padding-bottom: 10px; font-size: 15px; color: #aaa; cursor: pointer; font-weight: bold; }
        .tab.active { color: #fff; border-bottom: 3px solid #fff; }

        /* Anime Cards Grid */
        .anime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .anime-card { position: relative; border-radius: 5px; overflow: hidden; aspect-ratio: 2/3; background: #222; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; }
        .anime-card .badge { 
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); 
            font-size: 10px; padding: 2px 5px; border-radius: 3px; 
        }
        .anime-card .card-title {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 5px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Floating Download Button */
        .fab-download {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #00e6a8, #00b3cc);
            color: #000; border: none; padding: 12px 30px; border-radius: 30px;
            font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 230, 168, 0.4); cursor: pointer; z-index: 100;
        }
        .fab-download svg { fill: #000; width: 20px; height: 20px; }

    </style>
</head>

    </div>

    <!-- === JAVASCRIPT FOR PLAYER & SEAMLESS SWITCH === -->
    <script>
        const video = document.getElementById('mainVideo');
        const videoContainer = document.getElementById('videoContainer');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        // Parts Data for Seamless Switching
        const parts = [
            "https://files.catbox.moe/mzmdr8.mp4", // Part 1
            "https://files.catbox.moe/lz21c6.mp4"  // Part 2
        ];
        let currentPartIndex = 0;

        // --- Custom Player Controls Logic --- //

        // Play / Pause
        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }
        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        // Update UI on Play/Pause
        video.addEventListener('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            videoContainer.classList.add('playing');
        });
        
        video.addEventListener('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            videoContainer.classList.remove('playing');
        });

        // Format Time Helper
        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        // Update Progress Bar & Time
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressBar.style.width = percent + '%';
                timeDisplay.textContent = formatTime(video.currentTime) + "/" + formatTime(video.duration);
            }
        });

        // Click on Progress Bar to Seek
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        // Fullscreen Toggle (Works perfectly without stopping video)
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // Request Fullscreen on the CONTAINER, not just video
                if (videoContainer.requestFullscreen) {
                    videoContainer.requestFullscreen();
                } else if (videoContainer.webkitRequestFullscreen) { /* Safari */
                    videoContainer.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                }
            }
        });

        // --- Seamless Part Switching Logic --- //
        video.addEventListener('ended', () => {
            currentPartIndex++;
            
            // Check if next part exists
            if (currentPartIndex < parts.length) {
                console.log("Switching to next part seamlessly...");
                
                // Change source of EXACT SAME video element
                video.src = parts[currentPartIndex];
                
                // Play immediately (Fullscreen stays active because container is same)
                video.load();
                video.play();
            } else {
                // Episode Fully Ended
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                videoContainer.classList.remove('playing');
            }
        });

    </script>
</body>
