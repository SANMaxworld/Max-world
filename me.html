<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | MW Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        .profile-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); margin-bottom: 15px; }
        .history-item { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #ff0000; text-decoration: none; transition: 0.3s; }
        .history-item:hover { transform: translateX(5px); background: rgba(255,0,0,0.1); }
        .logout-btn { background: #222; color: #ff4444; border: 1px solid #ff4444; padding: 8px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .logout-btn:hover { background: #ff4444; color: #fff; }
    </style>
</head>
<body class="watch-container">

    <header>
        <div class="logo-section">
            <img src="logo.png" class="main-logo">
            <span class="brand-name neon-red-text">MW HUB</span>
        </div>
    </header>

    <div class="watch-content">
        <div id="auth-ui">
            <div id="login-state" style="display: none;">
                <div class="profile-card">
                    <img id="u-img" src="" class="user-avatar" alt="User">
                    <h2 id="u-name" style="color:#fff; margin-bottom: 5px;">User Name</h2>
                    <p id="u-email" style="color:#aaa; font-size: 13px;"></p>
                    <button onclick="logoutUser()" class="logout-btn">Logout Account</button>
                </div>

                <h3 class="resources-title" style="margin-top: 40px;">Continue Watching 🎬</h3>
                <div id="history-container" style="margin-top: 15px;">
                    <p style="color:#555; font-size: 13px;">Fetching your history...</p>
                </div>
            </div>

            <div id="logout-state" style="text-align: center; padding: 50px 20px;">
                <h2 style="margin-bottom: 10px;">Sync Your Data</h2>
                <p style="color:#bbb; margin-bottom: 30px; font-size: 14px;">Login with Google to keep your watch history safe across all devices.</p>
                <button onclick="loginUser()" class="action-btn" style="background:#4285F4; margin: 0 auto; display: flex; align-items: center; gap: 10px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Login with Google
                </button>
            </div>
        </div>

        <a href="index.html" class="back-home-btn">Back to Home</a>
    </div>

    <script src="profile-logic.js"></script>
</body>
</html>
