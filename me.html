<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | MW Hub</title>
    <link rel="stylesheet" href="index-style.css">
    <style>
        :root { --neon-red: #ff0000; --glass: rgba(255, 255, 255, 0.07); }
        body { background: #000; color: #fff; padding-bottom: 80px; font-family: sans-serif; }

        /* Login Screen */
        #loginScreen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .login-btn {
            background: #fff; color: #000; border: none; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* Profile Glass Card */
        .profile-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 25px; margin: 20px;
            display: flex; align-items: center; gap: 20px;
        }
        .avatar-container {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid var(--neon-red); overflow: hidden; position: relative;
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        /* History Section */
        .history-box { background: var(--glass); border-radius: 25px; margin: 20px; padding: 20px; }
        .history-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; }
        .history-scroll::-webkit-scrollbar { height: 4px; }
        .history-scroll::-webkit-scrollbar-thumb { background: var(--neon-red); border-radius: 10px; }

        .mini-card { flex: 0 0 110px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.05); }
        .mini-card img { width: 100%; height: 150px; object-fit: cover; }
        .progress-box { width: 100%; height: 4px; background: #333; }
        .progress-line { height: 100%; background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); }

        .support-btn {
            background: linear-gradient(45deg, #ff0000, #b30000);
            border: none; color: #fff; padding: 15px; width: calc(100% - 40px);
            margin: 20px; border-radius: 15px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1 style="color: var(--neon-red);">MAX WORLD HUB</h1>
        <p style="color: #666; margin-bottom: 20px;">Login to sync your history</p>
        <button class="login-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            Sign in with Google
        </button>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="profile-card">
            <div class="avatar-container">
                <img id="userAvatar" src="assets/default-avatar.png">
            </div>
            <div class="user-meta">
                <h2 id="userName">Loading...</h2>
                <button onclick="logout()" style="background:none; border:none; color:red; font-size:0.7rem; cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="history-box">
            <h3 style="margin:0 0 15px 0; color:var(--neon-red); font-size: 1rem;">CONTINUE WATCHING</h3>
            <div id="historyGrid" class="history-scroll">
                <p id="noHistory" style="font-size: 0.8rem; color:#555;">No watch history found.</p>
            </div>
        </div>

        <button class="support-btn">SUPPORT MW HUB</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.href='index.html'"><span class="nav-icon">🧭</span><span>Explore</span></div>
        <div class="nav-item" onclick="location.href='index.html'"><span class="nav-icon">🏠</span><span>Home</span></div>
        <div class="nav-item active"><span class="nav-icon">👤</span><span>Me</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAE_oP6wv4A1UxfEdcT82f4KZkhSBzfH3M",
            authDomain: "mw-hub-59e96.firebaseapp.com",
            projectId: "mw-hub-59e96",
            storageBucket: "mw-hub-59e96.firebasestorage.app",
            messagingSenderId: "1084767566489",
            appId: "1:1084767566489:web:5913fcac03c2947c9b1608"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Check User Session
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userAvatar').src = user.photoURL;
                fetchHistory(user.uid);
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        // Google Login
        window.loginWithGoogle = () => {
            signInWithPopup(auth, provider).catch(err => console.log(err));
        };

        // Logout
        window.logout = () => signOut(auth);

        // Fetch History from Firestore
        async function fetchHistory(uid) {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const historyData = docSnap.data().watchHistory || {};
                const grid = document.getElementById('historyGrid');
                const entries = Object.values(historyData);
                
                if(entries.length > 0) {
                    document.getElementById('noHistory').style.display = 'none';
                    grid.innerHTML = entries.map(anime => `
                        <div class="mini-card" onclick="location.href='anime/${anime.id}.html?lastEp=${anime.lastEp}'">
                            <img src="${anime.poster}">
                            <div class="progress-box"><div class="progress-line" style="width: ${anime.progress}%"></div></div>
                            <p style="font-size:0.6rem; padding:4px; margin:0; text-align:center;">Ep ${anime.lastEp}</p>
                        </div>
                    `).join('');
                }
            }
        }
    </script>
</body>
</html>
