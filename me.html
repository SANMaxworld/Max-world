<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MW Hub - My Profile</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <style>
        :root {
            --main-red: #ff0000;
            --neon-glow: 0 0 15px rgba(255, 0, 0, 0.8);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: #050505;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* --- LOGIN OVERLAY --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .google-btn {
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        /* --- 1. TOP PROFILE CONTAINER (Glass) --- */
        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .profile-frame {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--main-red);
            box-shadow: var(--neon-glow);
            overflow: hidden;
            cursor: pointer;
        }

        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }

        .name-input {
            background: transparent; border: none;
            border-bottom: 1px solid var(--main-red);
            color: white; font-size: 18px; font-weight: bold;
            outline: none; width: 60%;
        }

        .status-box {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #00ff88; font-weight: bold;
        }

        .led-blink {
            width: 10px; height: 10px; background: #00ff88;
            border-radius: 50%; box-shadow: 0 0 10px #00ff88;
            animation: blinker 1.5s infinite;
        }

        /* --- 2. RESUME CONTAINER (Bada Card) --- */
        .resume-wrapper {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-label { font-size: 16px; margin-bottom: 15px; display: block; border-left: 4px solid var(--main-red); padding-left: 10px; }

        .hero-card {
            position: relative;
            width: 180px; height: 260px; /* Bada Vertical */
            border-radius: 15px;
            background: #111;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
        }

        .hero-card img { width: 100%; height: 100%; object-fit: cover; }

        .resume-btn-style {
            width: 100%; padding: 10px;
            background: var(--main-red); color: white;
            font-weight: bold; position: absolute; bottom: 0; text-align: center;
        }

        /* --- 3. WATCH HISTORY CONTAINER (Glass) --- */
        .history-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .history-scroll {
            display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px;
        }

        .v-card {
            min-width: 120px; height: 180px; /* Chota Vertical */
            background: #111; border-radius: 10px;
            overflow: hidden; position: relative;
            border: 1px solid #222;
        }

        .v-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Progress Line (Red) */
        .progress-line {
            position: absolute; bottom: 0; left: 0;
            height: 4px; background: var(--main-red);
            box-shadow: var(--neon-glow);
        }

        .support-btn {
            display: block; width: 100%; padding: 15px;
            margin-top: 20px; background: var(--main-red);
            color: white; text-align: center; border-radius: 10px;
            text-decoration: none; font-weight: bold;
        }

        @keyframes blinker { 50% { opacity: 0.3; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--main-red)">MW HUB</h1>
        <p>Login to sync your watch history</p>
        <button class="google-btn" onclick="login()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
            Login with Google
        </button>
    </div>

    <div id="dashboard" style="display:none">
        
        <div class="profile-card">
            <div class="user-meta">
                <div class="profile-frame" onclick="document.getElementById('imgUpload').click()">
                    <img id="pfp" src="https://via.placeholder.com/150">
                    <input type="file" id="imgUpload" style="display:none" onchange="uploadImg(this)">
                </div>
                <input type="text" id="userName" class="name-input" placeholder="Enter Name..." onchange="saveName(this.value)">
            </div>
            <div class="status-box">
                <div class="led-blink"></div>
                <span>Google account connected</span>
            </div>
        </div>

        <div class="resume-wrapper">
            <span class="section-label">Resume Last Seen</span>
            <div class="hero-card" onclick="resumeAction()">
                <img id="heroImg" src="https://via.placeholder.com/180x260?text=No+History">
                <div class="progress-line" id="heroProgress" style="width: 0%;"></div>
                <div class="resume-btn-style">RESUME</div>
            </div>
        </div>

        <div class="history-container">
            <span class="section-label">Watch History</span>
            <div class="history-scroll" id="historyList">
                </div>
        </div>

        <a href="https://t.me/your_link" class="support-btn">SUPPORT MW HUB</a>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DB_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        // Login Function
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        // Image Upload
        function uploadImg(input) {
            const file = input.files[0];
            const user = auth.currentUser;
            if (user && file) {
                const ref = storage.ref(`users/${user.uid}/pfp.jpg`);
                ref.put(file).then(() => {
                    ref.getDownloadURL().then(url => {
                        document.getElementById('pfp').src = url;
                        db.ref(`users/${user.uid}/profileUrl`).set(url);
                    });
                });
            }
        }

        // Name Save
        function saveName(val) {
            const user = auth.currentUser;
            if (user) db.ref(`users/${user.uid}/displayName`).set(val);
        }

        // Auth Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                // Load User Info
                db.ref(`users/${user.uid}`).on('value', snap => {
                    const data = snap.val();
                    if (data?.profileUrl) document.getElementById('pfp').src = data.profileUrl;
                    if (data?.displayName) document.getElementById('userName').value = data.displayName;
                });

                // Load History
                db.ref(`users/${user.uid}/watchHistory`).orderByChild('timestamp').on('value', snap => {
                    const list = document.getElementById('historyList');
                    list.innerHTML = "";
                    let items = [];
                    
                    snap.forEach(child => {
                        const val = child.val();
                        items.unshift(val);
                        const prog = (val.episode / val.totalEp) * 100;
                        list.innerHTML += `
                            <div class="v-card" onclick="location.href='${val.link}?resumeEp=${val.episode}'">
                                <img src="${val.image}">
                                <div class="progress-line" style="width:${prog}%"></div>
                            </div>`;
                    });

                    if (items.length > 0) {
                        const last = items[0];
                        document.getElementById('heroImg').src = last.image;
                        document.getElementById('heroProgress').style.width = (last.episode / last.totalEp * 100) + "%";
                        window.resumeLink = `${last.link}?resumeEp=${last.episode}`;
                    }
                });
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        function resumeAction() { if(window.resumeLink) location.href = window.resumeLink; }
    </script>
</body>
    </html>
