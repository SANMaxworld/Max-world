<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | MW Hub</title>
    <style>
        :root {
            --neon-red: #ff0000;
            --neon-green: #39ff14;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-bottom: 100px; /* Space for bottom nav */
        }

        /* --- LOGIN INTERFACE --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .login-box {
            background: var(--glass);
            padding: 40px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            text-align: center; backdrop-filter: blur(20px);
        }

        .google-btn {
            background: #fff; color: #000; border: none; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 10px; margin-top: 20px;
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            margin: 30px 20px 10px 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            display: flex; align-items: center;
        }

        .avatar-wrapper {
            width: 75px; height: 75px; border-radius: 50%;
            border: 2px solid var(--neon-red); overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); cursor: pointer;
        }

        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .user-details { margin-left: 15px; }
        #userName { margin: 0; font-size: 1.2rem; outline: none; border-bottom: 1px solid transparent; }
        #userName:focus { border-bottom: 1px solid var(--neon-red); }

        .status-light-box {
            margin: 10px 20px; display: flex; align-items: center; gap: 8px;
            background: rgba(57, 255, 20, 0.05); padding: 8px 15px;
            border-radius: 15px; border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .light-dot {
            width: 8px; height: 8px; background: var(--neon-green);
            border-radius: 50%; box-shadow: 0 0 10px var(--neon-green);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .status-text { font-size: 0.75rem; color: var(--neon-green); }

        /* --- HISTORY SECTION --- */
        .history-card-box {
            background: var(--glass);
            margin: 20px; padding: 15px;
            border-radius: 25px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
        }

        .history-title { color: var(--neon-red); font-size: 1rem; margin-bottom: 15px; font-weight: bold; }

        .history-scroll {
            display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px;
        }
        .history-scroll::-webkit-scrollbar { display: none; }

        .vertical-card {
            flex: 0 0 110px; background: rgba(255,255,255,0.05);
            border-radius: 12px; overflow: hidden; position: relative;
            transition: transform 0.3s;
        }
        .vertical-card:active { transform: scale(0.95); }

        .vertical-card img { width: 100%; height: 150px; object-fit: cover; }

        .progress-line-container { width: 100%; height: 4px; background: #333; }
        .progress-line-fill { height: 100%; background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); }

        .card-info { padding: 5px; text-align: center; font-size: 0.65rem; color: #ccc; }

        /* --- SUPPORT & FOOTER --- */
        .support-btn {
            background: linear-gradient(45deg, #ff0000, #b30000);
            border: none; color: #fff; padding: 15px;
            width: calc(100% - 40px); margin: 20px;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
        }

        footer {
            text-align: center; padding: 20px; color: #555; font-size: 0.7rem;
            margin-top: 20px;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: var(--neon-red); margin: 0; letter-spacing: 2px;">MW HUB</h2>
            <p style="color: #888; font-size: 0.8rem; margin-top: 10px;">Login to save your progress</p>
            <button class="google-btn" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                Google Login
            </button>
        </div>
    </div>

    <div id="mainUI" style="display: none;">
        <div class="profile-container">
            <label for="fileInput" class="avatar-wrapper">
                <img id="userImg" src="https://via.placeholder.com/150" alt="Profile">
            </label>
            <input type="file" id="fileInput" accept="image/*">
            <div class="user-details">
                <h2 id="userName" contenteditable="true" onblur="saveProfile()">Guest User</h2>
                <p style="font-size: 0.6rem; color: #555; margin: 0; margin-top: 5px;">Tap name to edit</p>
            </div>
        </div>

        <div class="status-light-box">
            <div class="light-dot"></div>
            <span class="status-text">Your Google account is connected</span>
        </div>

        <div class="history-card-box">
            <div class="history-title">WATCH HISTORY</div>
            <div id="historyGrid" class="history-scroll">
                <p id="emptyMsg" style="font-size: 0.8rem; color: #444; padding: 10px;">No history found...</p>
            </div>
        </div>

        <button class="support-btn" onclick="alert('Support system coming soon!')">SUPPORT MW HUB</button>

        <footer>
            <p>© 2026 Max World Hub (MW Hub)<br>All Rights Reserved.</p>
        </footer>
    </div>

    <div style="position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; z-index: 999;">
        <div style="text-align: center; color: #666;" onclick="location.href='../index.html'">Explore</div>
        <div style="text-align: center; color: #666;" onclick="location.href='../index.html'">Home</div>
        <div style="text-align: center; color: var(--neon-red); font-weight: bold;">Me</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAE_oP6wv4A1UxfEdcT82f4KZkhSBzfH3M",
            authDomain: "mw-hub-59e96.firebaseapp.com",
            projectId: "mw-hub-59e96",
            storageBucket: "mw-hub-59e96.firebasestorage.app",
            messagingSenderId: "1084767566489",
            appId: "1:1084767566489:web:5913fcac03c2947c9b1608"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginOverlay = document.getElementById('loginOverlay');
        const mainUI = document.getElementById('mainUI');

        // Login Logic
        window.login = () => {
            signInWithPopup(auth, provider).catch(err => alert("Login Failed: " + err.message));
        };

        // Auth State Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginOverlay.style.display = 'none';
                mainUI.style.display = 'block';
                
                // Prioritize LocalStorage for custom edits, else use Google data
                document.getElementById('userName').innerText = localStorage.getItem('mw_name') || user.displayName;
                document.getElementById('userImg').src = localStorage.getItem('mw_img') || user.photoURL;
                
                loadHistory(user.uid);
            } else {
                loginOverlay.style.display = 'flex';
                mainUI.style.display = 'none';
            }
        });

        // Save Custom Profile locally
        window.saveProfile = () => {
            localStorage.setItem('mw_name', document.getElementById('userName').innerText);
        };

        // Profile Image Upload
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    document.getElementById('userImg').src = reader.result;
                    localStorage.setItem('mw_img', reader.result);
                };
                reader.readAsDataURL(file);
            }
        };

        // Load History from Firestore
        async function loadHistory(uid) {
            try {
                const docSnap = await getDoc(doc(db, "users", uid));
                if (docSnap.exists()) {
                    const history = docSnap.data().watchHistory || {};
                    const grid = document.getElementById('historyGrid');
                    const entries = Object.values(history).sort((a, b) => b.timestamp - a.timestamp);
                    
                    if(entries.length > 0) {
                        document.getElementById('emptyMsg').style.display = 'none';
                        grid.innerHTML = entries.map(item => `
                            <div class="vertical-card" onclick="location.href='anime/${item.id}.html?lastEp=${item.lastEp}'">
                                <img src="${item.poster}" onerror="this.src='https://via.placeholder.com/110x150?text=No+Image'">
                                <div class="progress-line-container">
                                    <div class="progress-line-fill" style="width: ${item.progress}%"></div>
                                </div>
                                <div class="card-info">EPISODE ${item.lastEp}</div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error("Error loading history:", error);
            }
        }
    </script>
</body>
</html>
