<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max World Hub - Pro Player</title>
    <style>
        /* === BASE SETTINGS === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
        body { background-color: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* === PLAYER CONTAINER === */
        .video-container {
            position: relative; width: 100%; max-width: 1000px; aspect-ratio: 16 / 9;
            background: #000; overflow: hidden; display: flex;
        }
        .video-container:fullscreen { max-width: 100%; width: 100vw; height: 100vh; }
        
        video { width: 100%; height: 100%; object-fit: contain; }

        /* === UI OVERLAY === */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: opacity 0.3s ease; z-index: 10;
        }
        .ui-layer.hidden { opacity: 0; pointer-events: none; }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .top-left { display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 500; }
        .top-right { display: flex; align-items: center; gap: 20px; font-size: 10px; text-align: center; color: #ccc;}
        .icon-btn { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        svg { fill: #fff; width: 24px; height: 24px; }

        /* --- CENTER CONTROLS --- */
        .center-controls {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; gap: 50px;
        }
        .skip-btn, .play-center-btn { background: none; border: none; cursor: pointer; opacity: 0.9; transition: transform 0.2s; }
        .skip-btn:active, .play-center-btn:active { transform: scale(0.9); }
        .skip-btn svg { width: 40px; height: 40px; }
        .play-center-btn svg { width: 60px; height: 60px; }

        /* --- LOCK BUTTON (LEFT) --- */
        .lock-container {
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 25px;
            font-size: 14px; opacity: 0.8; transition: opacity 0.3s; z-index: 20;
        }
        .lock-container:hover { opacity: 1; }
        .lock-container svg { width: 20px; height: 20px; }
        
        /* Locked State */
        .video-container.locked .ui-layer { opacity: 0; pointer-events: none; }
        .video-container.locked .lock-container { opacity: 1; pointer-events: all; }
        .video-container.locked .lock-text { display: none; } /* Hide text when locked */

        /* --- BOTTOM BAR --- */
        .bottom-bar {
            display: flex; align-items: center; padding: 15px 20px; gap: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .play-small-btn { background: none; border: none; cursor: pointer; }
        .play-small-btn svg { width: 20px; height: 20px; }
        
        .time-text { font-size: 12px; color: #ddd; white-space: nowrap; font-variant-numeric: tabular-nums;}
        
        .progress-wrapper { flex-grow: 1; height: 20px; display: flex; align-items: center; cursor: pointer; }
        .progress-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.3); position: relative; border-radius: 2px;}
        .progress-filled { height: 100%; background: #00e6a8; width: 0%; border-radius: 2px; position: absolute; top:0; left:0;}
        .progress-dot { 
            position: absolute; right: -6px; top: -4.5px; width: 12px; height: 12px; 
            background: #fff; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .bottom-tools { display: flex; align-items: center; gap: 20px; font-size: 13px; color: #ddd;}
        .tool-btn { display: flex; align-items: center; gap: 5px; cursor: pointer; transition: color 0.2s; }
        .tool-btn:hover { color: #fff; }
        .tool-btn svg { width: 18px; height: 18px; }
        .active-text { color: #00e6a8; font-weight: bold; }

        /* === RIGHT SIDE MENUS (Speed, Quality, Language) === */
        .side-menu {
            position: absolute; top: 0; right: -300px; width: 300px; height: 100%;
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(5px);
            transition: right 0.3s ease; z-index: 30; padding: 20px;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .side-menu.open { right: 0; }
        
        .menu-overlay-bg {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: transparent; z-index: 25; display: none;
        }
        .menu-overlay-bg.active { display: block; }

        .menu-item {
            padding: 15px 0; font-size: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item.active { color: #00e6a8; }
        .menu-item svg { width: 16px; height: 16px; fill: #00e6a8; display: none; }
        .menu-item.active svg { display: block; }

        /* Custom Language Menu UI */
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .lang-col { display: flex; flex-direction: column; }
        .lang-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #fff; text-align: center;}
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px;}
        .toggle-switch { width: 40px; height: 20px; background: #00e6a8; border-radius: 10px; position: relative; cursor: pointer;}
        .toggle-switch::after { content: ''; position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; }
        .toggle-switch.off { background: #555; }
        .toggle-switch.off::after { right: auto; left: 2px; }

    </style>
</head>

    <!-- === JAVASCRIPT: LOGIC & ADVANCE SYSTEM === -->
    <script>
        const video = document.getElementById('mainVideo');
        const container = document.getElementById('videoContainer');
        const uiLayer = document.getElementById('uiLayer');
        
        // Buttons & Icons
        const playCenterBtn = document.getElementById('playCenterBtn');
        const playSmallBtn = document.getElementById('playSmallBtn');
        const playIconBig = document.getElementById('playIconBig');
        const pauseIconBig = document.getElementById('pauseIconBig');
        const playIconSmall = document.getElementById('playIconSmall');
        const pauseIconSmall = document.getElementById('pauseIconSmall');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const fitBtn = document.getElementById('fitBtn');
        
        // Lock System
        const lockBtn = document.getElementById('lockBtn');
        const lockIconOpen = document.getElementById('lockIconOpen');
        const lockIconClosed = document.getElementById('lockIconClosed');
        const lockText = document.getElementById('lockText');
        let isLocked = false;

        // Progress
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const currentTimeTxt = document.getElementById('currentTimeTxt');
        const durationTxt = document.getElementById('durationTxt');

        // Menus
        const menuOverlayBg = document.getElementById('menuOverlayBg');
        const speedMenuBtn = document.getElementById('speedMenuBtn');
        const qualityMenuBtn = document.getElementById('qualityMenuBtn');
        const langMenuBtn = document.getElementById('langMenuBtn');
        const speedMenu = document.getElementById('speedMenu');
        const qualityMenu = document.getElementById('qualityMenu');
        const langMenu = document.getElementById('langMenu');
        const speedTxt = document.getElementById('speedTxt');

        // --- 1. PLAY / PAUSE LOGIC ---
        function togglePlay() {
            if (video.paused) video.play();
            else video.pause();
        }
        playCenterBtn.addEventListener('click', togglePlay);
        playSmallBtn.addEventListener('click', togglePlay);

        video.addEventListener('play', () => {
            playIconBig.style.display = 'none'; pauseIconBig.style.display = 'block';
            playIconSmall.style.display = 'none'; pauseIconSmall.style.display = 'block';
        });
        video.addEventListener('pause', () => {
            playIconBig.style.display = 'block'; pauseIconBig.style.display = 'none';
            playIconSmall.style.display = 'block'; pauseIconSmall.style.display = 'none';
        });

        // --- 2. TIME & PROGRESS LOGIC ---
        function formatTime(sec) {
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
        }
        
        video.addEventListener('loadedmetadata', () => {
            durationTxt.innerText = formatTime(video.duration);
        });

        video.addEventListener('timeupdate', () => {
            if(video.duration){
                currentTimeTxt.innerText = formatTime(video.currentTime);
                progressBar.style.width = (video.currentTime / video.duration * 100) + '%';
            }
        });

        progressWrapper.addEventListener('click', (e) => {
            const rect = progressWrapper.getBoundingClientRect();
            video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
        });

        // --- 3. SKIP 10s LOGIC ---
        rewindBtn.addEventListener('click', () => video.currentTime = Math.max(0, video.currentTime - 10));
        forwardBtn.addEventListener('click', () => video.currentTime = Math.min(video.duration, video.currentTime + 10));

        // --- 4. LOCK SYSTEM ---
        lockBtn.addEventListener('click', () => {
            isLocked = !isLocked;
            if(isLocked) {
                container.classList.add('locked');
                lockIconOpen.style.display = 'none';
                lockIconClosed.style.display = 'block';
            } else {
                container.classList.remove('locked');
                lockIconOpen.style.display = 'block';
                lockIconClosed.style.display = 'none';
                resetHideTimer();
            }
        });

        // --- 5. HIDE UI ON INACTIVITY ---
        let hideTimeout;
        function resetHideTimer() {
            if (isLocked) return;
            uiLayer.classList.remove('hidden');
            lockBtn.style.opacity = '1';
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                if(!video.paused) {
                    uiLayer.classList.add('hidden');
                    lockBtn.style.opacity = '0';
                }
            }, 3000); // 3 seconds timeout
        }
        container.addEventListener('mousemove', resetHideTimer);
        container.addEventListener('click', resetHideTimer);

        // --- 6. FULLSCREEN (FIT) LOGIC ---
        fitBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) container.requestFullscreen().catch(err=>{});
            else document.exitFullscreen();
        });

        // --- 7. MENUS LOGIC ---
        function closeAllMenus() {
            speedMenu.classList.remove('open');
            qualityMenu.classList.remove('open');
            langMenu.classList.remove('open');
            menuOverlayBg.classList.remove('active');
        }

        function openMenu(menu) {
            closeAllMenus();
            menu.classList.add('open');
            menuOverlayBg.classList.add('active');
        }

        speedMenuBtn.addEventListener('click', () => openMenu(speedMenu));
        qualityMenuBtn.addEventListener('click', () => openMenu(qualityMenu));
        langMenuBtn.addEventListener('click', () => openMenu(langMenu));
        menuOverlayBg.addEventListener('click', closeAllMenus);

        // Speed Menu Selection
        const speedItems = speedMenu.querySelectorAll('.menu-item');
        speedItems.forEach(item => {
            item.addEventListener('click', () => {
                speedItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                let speed = item.getAttribute('data-speed');
                video.playbackRate = parseFloat(speed);
                speedTxt.innerText = speed + 'x';
                closeAllMenus();
            });
        });

        // Toggles in Lang Menu
        const toggles = document.querySelectorAll('.toggle-switch');
        toggles.forEach(t => {
            t.addEventListener('click', () => t.classList.toggle('off'));
        });


        // --- 8. ADVANCE SYSTEM (Seamless Autoplay Next Part) ---
        // (तुम्हारे पिछले लिंक्स के साथ इंटीग्रेटेड)
        const parts = [
            "https://files.catbox.moe/mzmdr8.mp4", // Part 1
            "https://files.catbox.moe/lz21c6.mp4"  // Part 2
        ];
        let currentPartIndex = 0;

        video.addEventListener('ended', () => {
            currentPartIndex++;
            if (currentPartIndex < parts.length) {
                video.src = parts[currentPartIndex];
                video.load();
                video.play();
            } else {
                // Episode Ended
                playIconBig.style.display = 'block'; pauseIconBig.style.display = 'none';
                playIconSmall.style.display = 'block'; pauseIconSmall.style.display = 'none';
                uiLayer.classList.remove('hidden');
            }
        });

    </script>
</body>
</html>
